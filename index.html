<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>长期照护师（初级）在线题库</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --c1:#0f766e;--c2:#0d9488;--c3:#14b8a6;--c4:#2dd4bf;--c5:#99f6e4;--c6:#ccfbf1;
  --bg:#f0fdf4;--paper:#fff;--ink:#1a1a2e;--sub:#64748b;--line:#e2e8f0;
  --ok:#16a34a;--ok2:#dcfce7;--no:#dc2626;--no2:#fee2e2;--warn:#f59e0b;--warn2:#fef3c7;
  --purple:#7c3aed;--purple2:#ede9fe;
  --blue:#2563eb;--blue2:#dbeafe;
  --r:16px;--font:'Inter',system-ui,-apple-system,"PingFang SC","Microsoft YaHei","Hiragino Sans GB",sans-serif;
  --shadow:0 1px 3px rgba(0,0,0,.06),0 6px 16px rgba(0,0,0,.06);
  --shadow2:0 4px 24px rgba(0,0,0,.1);
}
html{scroll-behavior:smooth}
body{font-family:var(--font);background:var(--bg);color:var(--ink);line-height:1.6;
  -webkit-font-smoothing:antialiased;overflow-x:hidden;
  padding-bottom:env(safe-area-inset-bottom)}
button{font-family:inherit;cursor:pointer;border:none;background:none;-webkit-tap-highlight-color:transparent}
:focus-visible{outline:3px solid var(--c3);outline-offset:2px;border-radius:8px}
@media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
.wrap{max-width:640px;margin:0 auto;padding:0 16px}

/* ── screens ── */
.scr{display:none;min-height:100dvh}.scr.on{display:block;animation:fadeUp .35s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}

/* ══════════ HEADER ══════════ */
.hdr{position:sticky;top:0;z-index:40;backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  background:rgba(240,253,244,.78);border-bottom:1px solid rgba(226,232,240,.6)}
.hdr .wrap{display:flex;align-items:center;height:52px;gap:10px}
.logo{display:flex;align-items:center;gap:8px;font-weight:800;font-size:15px;letter-spacing:.3px}
.logo i{width:28px;height:28px;border-radius:9px;background:linear-gradient(135deg,var(--c1),var(--c3));
  display:grid;place-items:center;color:#fff;font-style:normal;font-size:14px;font-weight:900}
.hdr .sp{flex:1}
.hdr .gb{font-size:13px;font-weight:700;color:var(--c1);padding:8px 12px;border-radius:10px;transition:.15s}
.hdr .gb:hover{background:var(--c6)}

/* ══════════ HOME ══════════ */
.hero{padding:32px 0 14px;position:relative}
.hero::before{content:"";position:absolute;top:-52px;left:-40%;right:-40%;height:320px;
  background:linear-gradient(135deg,#d1fae5 0%,#a7f3d0 30%,#5eead4 60%,#2dd4bf 100%);
  border-radius:0 0 50% 50%;z-index:-1;opacity:.45}
.tag{display:inline-flex;align-items:center;gap:6px;background:var(--c6);color:var(--c1);
  font-size:12px;font-weight:700;padding:5px 12px;border-radius:999px;letter-spacing:.8px;margin-bottom:10px}
.tag::before{content:"";width:7px;height:7px;border-radius:50%;background:var(--c2);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.hero h1{font-size:28px;font-weight:900;line-height:1.3;letter-spacing:.3px;
  background:linear-gradient(135deg,var(--c1),#0e7490);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hero p{color:var(--sub);font-size:14px;margin-top:6px;max-width:420px}

.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin:18px 0}
.st{background:var(--paper);border:1px solid var(--line);border-radius:14px;padding:14px 10px;
  text-align:center;box-shadow:var(--shadow);transition:transform .15s}
.st:hover{transform:translateY(-2px)}
.st b{display:block;font-size:24px;font-weight:900;background:linear-gradient(135deg,var(--c1),var(--c2));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.st span{font-size:11px;color:var(--sub);font-weight:600}

.card{background:var(--paper);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow);
  padding:20px;margin:14px 0;transition:box-shadow .2s}
.card:hover{box-shadow:var(--shadow2)}
.card h2{font-size:15px;font-weight:800;margin-bottom:2px}
.card .sub{font-size:12px;color:var(--sub);margin-bottom:16px}

.fld{margin:18px 0}
.fld>label{display:block;font-size:13px;font-weight:700;margin-bottom:10px}
.fld>label em{font-style:normal;font-weight:500;color:var(--sub);margin-left:6px;font-size:12px}

.chips{display:flex;gap:8px;flex-wrap:wrap}
.ch{font-size:13px;padding:9px 15px;border:1.5px solid var(--line);border-radius:999px;font-weight:600;
  background:var(--paper);color:var(--ink);transition:all .15s;display:inline-flex;align-items:center;gap:6px}
.ch .n{font-size:11px;color:var(--sub);font-weight:700;background:var(--bg);padding:1px 6px;border-radius:6px}
.ch:hover{border-color:var(--c3);background:var(--c6)}
.ch[aria-pressed="true"]{background:linear-gradient(135deg,var(--c1),var(--c2));border-color:transparent;color:#fff;box-shadow:0 2px 8px rgba(13,148,136,.25)}
.ch[aria-pressed="true"] .n{background:rgba(255,255,255,.2);color:#fff}

.seg{display:flex;border:1.5px solid var(--line);border-radius:12px;overflow:hidden;background:var(--paper)}
.seg button{flex:1;padding:12px 8px;font-size:14px;font-weight:700;color:var(--sub);background:var(--paper);transition:.15s}
.seg button+button{border-left:1.5px solid var(--line)}
.seg button[aria-pressed="true"]{background:linear-gradient(135deg,var(--c1),var(--c2));color:#fff}
.mdesc{font-size:12px;color:var(--sub);margin-top:8px;min-height:17px}

.gobtn{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;
  background:linear-gradient(135deg,var(--c1),#0e7490);color:#fff;font-size:17px;font-weight:800;
  padding:17px;border-radius:14px;letter-spacing:.3px;
  box-shadow:0 4px 14px rgba(15,118,110,.3),0 8px 24px rgba(15,118,110,.15);
  transition:transform .12s,box-shadow .12s;margin-top:6px}
.gobtn:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(15,118,110,.35)}
.gobtn:active{transform:scale(.98)}
.gobtn:disabled{background:#94a3b8;box-shadow:none;cursor:not-allowed}
.gobtn .cnt{background:rgba(255,255,255,.2);padding:3px 11px;border-radius:8px;font-size:14px;font-variant-numeric:tabular-nums}
.foot{text-align:center;color:var(--sub);font-size:11px;padding:22px 0 36px}

/* ══════════ QUIZ ══════════ */
.qbar{position:sticky;top:52px;z-index:30;backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
  background:rgba(240,253,244,.85);border-bottom:1px solid rgba(226,232,240,.5);padding:10px 0}
.qbar .wrap{display:flex;align-items:center;gap:12px}
.prog{flex:1}
.prog .meta{display:flex;justify-content:space-between;font-size:11px;color:var(--sub);margin-bottom:5px;font-weight:600;font-variant-numeric:tabular-nums}
.bar{height:7px;background:var(--line);border-radius:999px;overflow:hidden}
.bar i{display:block;height:100%;border-radius:999px;width:0;transition:width .4s ease;
  background:linear-gradient(90deg,var(--c1),var(--c3))}
.tmr{font-size:13px;color:var(--sub);font-variant-numeric:tabular-nums;font-weight:700;
  background:var(--paper);padding:6px 10px;border-radius:9px;border:1px solid var(--line)}
.cdbtn{font-size:12px;font-weight:700;color:var(--c1);padding:8px 12px;border-radius:10px;
  background:var(--c6);border:1.5px solid var(--c5);transition:.15s}
.cdbtn:hover{background:var(--c5)}

/* question card */
.qc{background:var(--paper);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow);
  padding:22px 20px;margin:14px 0;animation:fadeUp .3s ease}
.qh{display:flex;align-items:center;gap:8px;margin-bottom:14px;flex-wrap:wrap}
.bdg{font-size:11px;font-weight:700;padding:4px 10px;border-radius:8px}
.bdg.single{background:var(--c6);color:var(--c1)}
.bdg.multi{background:var(--purple2);color:var(--purple)}
.bdg.tf{background:var(--warn2);color:#92400e}
.bdg.short{background:var(--blue2);color:var(--blue)}
.qh .src{font-size:11px;color:var(--sub)}
.qh .qno{font-size:11px;color:var(--sub);margin-left:auto;font-variant-numeric:tabular-nums}
.flg{font-size:12px;color:var(--sub);padding:5px 9px;border-radius:8px;font-weight:600;transition:.15s}
.flg[aria-pressed="true"]{background:var(--warn2);color:var(--warn)}
.stem{font-size:17px;font-weight:700;line-height:1.7;margin:0 0 18px;letter-spacing:.2px}

.opts{display:flex;flex-direction:column;gap:10px}
.opt{display:flex;align-items:flex-start;gap:12px;width:100%;text-align:left;padding:14px 16px;
  border:1.5px solid var(--line);border-radius:14px;background:var(--paper);font-size:15px;line-height:1.55;
  transition:all .15s;color:var(--ink)}
.opt:hover{border-color:var(--c3);background:var(--c6);transform:translateX(2px)}
.opt .k{flex:none;width:28px;height:28px;border-radius:50%;border:2px solid var(--line);
  display:grid;place-items:center;font-size:13px;font-weight:800;color:var(--sub);transition:all .15s}
.opt .tx{flex:1;padding-top:2px}
.opt[aria-pressed="true"]{border-color:var(--c2);background:var(--c6)}
.opt[aria-pressed="true"] .k{background:linear-gradient(135deg,var(--c1),var(--c2));border-color:var(--c2);color:#fff}
.opt.correct{border-color:var(--ok);background:var(--ok2)}
.opt.correct .k{background:var(--ok);border-color:var(--ok);color:#fff}
.opt.wrong{border-color:var(--no);background:var(--no2)}
.opt.wrong .k{background:var(--no);border-color:var(--no);color:#fff}
.opt.lk{cursor:default}.opt.lk:hover{transform:none}

.sbox textarea{width:100%;min-height:100px;border:1.5px solid var(--line);border-radius:14px;padding:14px;
  font-family:inherit;font-size:15px;line-height:1.6;resize:vertical;background:var(--paper);color:var(--ink);transition:.15s}
.sbox textarea:focus{outline:none;border-color:var(--c2);box-shadow:0 0 0 3px var(--c6)}

.cfm{margin-top:14px;width:100%;background:linear-gradient(135deg,var(--c1),var(--c2));color:#fff;
  font-weight:700;font-size:15px;padding:14px;border-radius:12px;box-shadow:0 2px 8px rgba(13,148,136,.2)}
.cfm:disabled{background:#94a3b8;box-shadow:none}

.rvl{margin-top:16px;border-top:1.5px dashed var(--line);padding-top:16px;display:none}
.rvl.show{display:block;animation:fadeUp .25s ease}
.vd{display:flex;align-items:center;gap:9px;font-weight:700;font-size:15px;margin-bottom:8px}
.vd.ok{color:var(--ok)}.vd.no{color:var(--no)}
.vd i{width:22px;height:22px;border-radius:50%;display:grid;place-items:center;color:#fff;font-size:12px;font-style:normal;flex:none}
.vd.ok i{background:var(--ok)}.vd.no i{background:var(--no)}
.aln{font-size:14px;margin:4px 0;color:var(--ink)}.aln b{color:var(--c1)}
.expl{font-size:13px;color:var(--sub);margin-top:8px;background:var(--c6);border-radius:11px;padding:11px 14px;border:1px solid var(--c5)}
.refans{font-size:14px;line-height:1.7;background:var(--c6);border:1px solid var(--c5);border-radius:11px;padding:13px;margin-top:5px}
.self{display:flex;gap:10px;margin-top:12px}
.self button{flex:1;padding:11px;border-radius:11px;font-size:13px;font-weight:700;border:1.5px solid var(--line);color:var(--sub);background:var(--paper);transition:.15s}
.self .kn[aria-pressed="true"]{background:var(--ok2);border-color:var(--ok);color:var(--ok)}
.self .dk[aria-pressed="true"]{background:var(--no2);border-color:var(--no);color:var(--no)}

/* nav */
.nav{position:sticky;bottom:0;z-index:30;backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
  background:rgba(240,253,244,.88);border-top:1px solid rgba(226,232,240,.5);
  padding:10px 0 calc(10px + env(safe-area-inset-bottom))}
.nav .wrap{display:flex;gap:10px;align-items:center}
.nb{padding:14px 18px;border-radius:12px;font-size:15px;font-weight:700;border:1.5px solid var(--line);background:var(--paper);color:var(--ink);transition:.15s}
.nb:hover{background:var(--c6)}
.nb:disabled{opacity:.35;cursor:not-allowed}
.nb.prev{flex:none}
.nb.nxt{flex:1;background:linear-gradient(135deg,var(--c1),var(--c2));color:#fff;border-color:transparent;box-shadow:0 2px 8px rgba(13,148,136,.2)}
.nb.sub{flex:1;background:linear-gradient(135deg,#0e7490,var(--c1));color:#fff;border-color:transparent}

/* ══════════ SHEET ══════════ */
.sheet{position:fixed;inset:0;z-index:60;display:none}
.sheet.open{display:block}
.scrm{position:absolute;inset:0;background:rgba(15,23,42,.45);backdrop-filter:blur(4px)}
.pnl{position:absolute;left:0;right:0;bottom:0;max-height:80vh;background:var(--paper);
  border-radius:22px 22px 0 0;padding:20px 18px calc(22px + env(safe-area-inset-bottom));overflow:auto;
  animation:su .28s ease;box-shadow:0 -8px 32px rgba(0,0,0,.12)}
@keyframes su{from{transform:translateY(100%)}to{transform:none}}
.pnl h3{font-size:17px;font-weight:800;margin-bottom:4px}
.lgd{display:flex;gap:14px;font-size:11px;color:var(--sub);margin:8px 0 16px;flex-wrap:wrap;font-weight:600}
.lgd span{display:inline-flex;align-items:center;gap:5px}
.dt{width:12px;height:12px;border-radius:4px;display:inline-block;border:1.5px solid var(--line)}
.dt.dn{background:var(--c6);border-color:var(--c2)}
.dt.fg{background:var(--warn2);border-color:var(--warn)}
.dt.cu{background:var(--c2);border-color:var(--c2)}
.grd{display:grid;grid-template-columns:repeat(auto-fill,minmax(46px,1fr));gap:8px}
.gc{aspect-ratio:1;border:1.5px solid var(--line);border-radius:11px;font-size:13px;font-weight:700;
  color:var(--ink);background:var(--paper);font-variant-numeric:tabular-nums;display:grid;place-items:center;
  position:relative;transition:.12s}
.gc:hover{border-color:var(--c3)}
.gc.dn{background:var(--c6);border-color:var(--c2);color:var(--c1)}
.gc.fg{border-color:var(--warn)}
.gc.fg::after{content:"";position:absolute;top:4px;right:4px;width:6px;height:6px;border-radius:50%;background:var(--warn)}
.gc.cu{background:linear-gradient(135deg,var(--c1),var(--c2));border-color:var(--c2);color:#fff;box-shadow:0 0 0 3px var(--c6)}
.sbtns{display:flex;gap:10px;margin-top:18px}
.sbtns button{flex:1;padding:14px;border-radius:12px;font-weight:700;font-size:15px}
.bo{border:1.5px solid var(--line);background:var(--paper);color:var(--ink)}
.bf{background:linear-gradient(135deg,#0e7490,var(--c1));color:#fff}

/* ══════════ RESULTS ══════════ */
.rh{text-align:center;padding:30px 0 8px}
.ring{--p:0;width:180px;height:180px;border-radius:50%;margin:8px auto 16px;display:grid;place-items:center;
  background:conic-gradient(var(--c1) calc(var(--p)*1%),var(--line) 0);position:relative;transition:--p 1.2s ease}
.ring::before{content:"";position:absolute;inset:14px;background:var(--paper);border-radius:50%;box-shadow:inset 0 2px 8px rgba(0,0,0,.05)}
.ring .inn{position:relative;text-align:center}
.ring .sc{font-size:48px;font-weight:900;line-height:1;font-variant-numeric:tabular-nums;
  background:linear-gradient(135deg,var(--c1),#0e7490);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.ring .sc small{font-size:20px;font-weight:700;-webkit-text-fill-color:var(--sub)}
.ring .lb{font-size:12px;color:var(--sub);margin-top:4px;font-weight:600;letter-spacing:.5px}
.pp{display:inline-flex;align-items:center;gap:7px;font-weight:700;font-size:14px;padding:8px 18px;border-radius:999px}
.pp.pass{background:var(--ok2);color:var(--ok)}.pp.fail{background:var(--no2);color:var(--no)}
.rsts{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin:20px 0}
.rs{background:var(--paper);border:1px solid var(--line);border-radius:14px;padding:14px 8px;text-align:center;box-shadow:var(--shadow)}
.rs b{display:block;font-size:22px;font-weight:900;font-variant-numeric:tabular-nums}
.rs span{font-size:11px;color:var(--sub);font-weight:600}
.rs.g b{color:var(--ok)}.rs.r b{color:var(--no)}
.rvh{display:flex;align-items:center;justify-content:space-between;margin:20px 0 12px}
.rvh h2{font-size:17px;font-weight:800}
.fp{font-size:12px;font-weight:700;padding:8px 14px;border-radius:999px;border:1.5px solid var(--line);color:var(--sub);background:var(--paper);transition:.15s}
.fp[aria-pressed="true"]{background:var(--no2);border-color:var(--no);color:var(--no)}
.rv{background:var(--paper);border:1px solid var(--line);border-radius:14px;padding:16px;margin-bottom:12px;box-shadow:var(--shadow);transition:.15s}
.rv:hover{box-shadow:var(--shadow2)}
.rv.iw{border-left:4px solid var(--no)}.rv.ir{border-left:4px solid var(--ok)}
.rv .rh2{display:flex;gap:8px;align-items:center;margin-bottom:10px;flex-wrap:wrap}
.rv .stm{font-size:15px;font-weight:700;margin-bottom:10px;line-height:1.6}
.rv .ro{font-size:13px;padding:8px 12px;border-radius:10px;margin:4px 0;border:1px solid var(--line)}
.rv .ro.c{background:var(--ok2);border-color:var(--ok);color:#155}.rv .ro.w{background:var(--no2);border-color:var(--no)}
.rv .yr{font-size:13px;color:var(--sub);margin-top:8px}.rv .yr b.ok{color:var(--ok)}.rv .yr b.no{color:var(--no)}
.racts{display:flex;gap:10px;margin:16px 0 36px;flex-wrap:wrap}
.racts button{flex:1;min-width:130px;padding:16px;border-radius:14px;font-weight:800;font-size:15px;transition:.15s}
.rr{background:linear-gradient(135deg,var(--no),#b91c1c);color:#fff;box-shadow:0 2px 8px rgba(220,38,38,.2)}
.rhm{border:1.5px solid var(--line);background:var(--paper);color:var(--ink)}
.hidden{display:none!important}
.toast{position:fixed;left:50%;bottom:90px;transform:translateX(-50%);background:var(--ink);color:#fff;
  font-size:13px;font-weight:600;padding:10px 18px;border-radius:12px;z-index:80;opacity:0;
  pointer-events:none;transition:opacity .2s;box-shadow:var(--shadow2)}
.toast.show{opacity:.96}
.sn{font-size:13px;color:var(--sub);background:var(--c6);border:1px solid var(--c5);border-radius:11px;padding:11px 14px;margin:4px 0 0}
@media(max-width:480px){
  .stats{grid-template-columns:repeat(2,1fr)}
  .rsts{grid-template-columns:repeat(2,1fr)}
  .hero h1{font-size:24px}
  .stem{font-size:15.5px}
  .opt{padding:12px 13px;font-size:14px}
}
</style>
</head>
<body>

<div class="hdr"><div class="wrap">
  <div class="logo"><i>护</i>长护师题库</div>
  <div class="sp"></div>
  <button class="gb" id="homeBtn" style="display:none">退出</button>
</div></div>

<!-- HOME -->
<section class="scr on" id="home"><div class="wrap">
  <div class="hero">
    <div class="tag">在线学习 · 随时练习</div>
    <h1>长期照护师 · 初级<br>理论考试在线题库</h1>
    <p>依据教材编写，覆盖四大职业模块的操作要点与知识重点。自选范围与题量，即开即考。</p>
  </div>
  <div class="stats">
    <div class="st"><b id="t0">0</b><span>题库总量</span></div>
    <div class="st"><b id="t1">0</b><span>单选</span></div>
    <div class="st"><b id="t2">0</b><span>多选</span></div>
    <div class="st"><b id="t3">0</b><span>判断</span></div>
  </div>
  <div class="card">
    <h2>组卷设置</h2>
    <p class="sub">选好范围、题量，点击底部按钮即可开考。</p>
    <div class="fld"><label>答题方式</label>
      <div class="seg" id="mSeg"><button data-v="practice" aria-pressed="true">练习模式</button><button data-v="exam" aria-pressed="false">考试模式</button></div>
      <div class="mdesc" id="mDesc">每题作答后即时显示对错与解析。</div>
    </div>
    <div class="fld"><label>题型 <em>可多选</em></label><div class="chips" id="tCh"></div></div>

合深化（一）：操作细节单选题","s":"为对象选择床垫越软越好。（　）","t":"tf","a":"×","e":"宜选硬度较高、能贴合身体曲线的床垫"},{"n":378,"m":"综合深化（一）：操作细节单选题","s":"床上擦浴擦洗上肢应由手腕沿前臂外侧螺旋向上至肩。（　）","t":"tf","a":"√"},{"n":379,"m":"综合深化（一）：操作细节单选题","s":"淋浴试好水温后应先淋双足，再逐渐喷向双腿、上身、头部。（　）","t":"tf","a":"√"},{"n":380,"m":"综合深化（一）：操作细节单选题","s":"穿戴膝关节固定器期间应加强局部皮肤护理、避免压疮。（　）","t":"tf","a":"√"},{"n":381,"m":"综合深化（一）：操作细节单选题","s":"简述\"七步洗手法\"的七个步骤（口诀）。","t":"short","a":"内（洗手掌）、外（洗背侧指缝）、夹（洗掌侧指缝）、弓（洗指背）、大（洗拇指）、立（洗指尖）、腕（洗手腕）；流动水下涂洗手液依次揉搓，双手交换进行。"},{"n":382,"m":"综合深化（一）：操作细节单选题","s":"简述噎食、误吸时气道部分阻塞与完全阻塞的主要表现区别。","t":"short","a":"部分阻塞：仍能咳嗽、说话或发声，吸气时可发出高调鸡鸣音/犬吠声，面色甲床青紫，多呈\"V\"形手势紧贴喉部。完全阻塞：不能说话、咳嗽或呼吸，面色青紫或苍白，随后很快昏迷倒地、意识丧失。"},{"n":383,"m":"综合深化（一）：操作细节单选题","s":"简述呼吸、心跳骤停的\"三联征\"及识别（判断）步骤。","t":"short","a":"三联征：突发意识丧失、呼吸停止、大动脉搏动消失。识别步骤：①迅速响应、确认环境安全；②判断意识——轻拍双肩、两侧耳边大声呼唤，无反应即无意识；③判断呼吸——听看感觉，观察面色及胸腹起伏5～10s（不超过10s），无起伏或仅濒死叹息样呼吸即按无呼吸处理；④立即启动急救、拨打120、实施CPR。"},{"n":384,"m":"综合深化（一）：操作细节单选题","s":"拨打\"120\"急救电话时需重点告知哪些关键信息？","t":"short","a":"①具体地址（区/街道/小区/楼号/门牌号，不清楚时报附近标志性建筑）；②具体病情（按\"何时、何因、何部位、何情况\"描述，并报对象姓名、年龄、性别）；③有效联系电话（接应人姓名及电话）。同时听从调度员指示，保持电话畅通、不抢挂断。"},{"n":385,"m":"综合深化（一）：操作细节单选题","s":"简述互救腹部冲击法（海姆立克法）的操作要点。","t":"short","a":"施救者弓步站在对象背后、双臂环抱腹部，令其弯腰头前倾；一手握拳、虎口侧顶在剑突与肚脐之间（脐上两横指、腹部正中线），另一手抓紧此拳，快速有力向内、向上冲击5次；查口腔；最多重复5次，未解除则交替5次背部叩击与5次腹部冲击，直至缓解或专业人员到达。"},{"n":386,"m":"综合深化（一）：操作细节单选题","s":"简述成人徒手心肺复苏的基本程序及胸外按压要点。","t":"short","a":"程序：胸外按压（C）→开放气道（A）→人工呼吸（B）。按压要点：对象仰卧于硬平面，掌根置于胸骨下半部（两乳头连线中点），垂直下压使胸骨下陷5～6cm，频率100～120次/分，按压与放松时间相等，充分回弹，减少中断（每次<10s）；按压与人工呼吸比例30∶2，做5组后复查。"},{"n":387,"m":"综合深化（一）：操作细节单选题","s":"简述偏瘫长期照护对象穿、脱上衣应遵循的原则。","t":"short","a":"\"先脱健侧、后脱患侧；先穿患侧、后穿健侧\"；穿脱时顺应患侧屈曲功能位，禁止拉、拽，以免损伤；抬高床头时不放下床挡以防坠床。"},{"n":388,"m":"综合深化（一）：操作细节单选题","s":"简述安放良肢位的主要目的。","t":"short","a":"最大程度保护偏瘫对象的肢体功能、为后续康复奠定基础；防止和对抗痉挛模式出现、保护肩关节防半脱位、防止骨盆后倾及髋关节外展外旋、促进早期分离运动恢复；并预防压疮、肺部感染和泌尿系统感染等并发症。"},{"n":389,"m":"综合深化（一）：操作细节单选题","s":"简述测量血压的主要注意事项（至少4点）。","t":"short","a":"①偏瘫/外伤/术后选健侧测量；②袖带绑肘上1～2cm、松紧以能插入一指；③上肢肱动脉与心脏同一水平（卧位平腋中线、坐位平第4肋）；④首次测双臂取较高侧；⑤间隔1～2min重测取均值，两次差>5mmHg则测第三次取均值；⑥持续观察者做到\"四定\"（定时间、定部位、定体位、定血压计）。"},{"n":390,"m":"综合深化（一）：操作细节单选题","s":"简述使用血糖仪测量血糖的主要步骤。","t":"short","a":"温水洗手擦干→启动血糖仪、插入试纸（核对编码、首开试纸标注日期）→用75%酒精消毒指尖侧面、待酒精挥发后采血→弃去第一滴血、取第二滴滴于试纸指定区域→等待数秒读取结果→无菌棉签按压采血点1～2min止血→记录结果与时间。"},{"n":391,"m":"综合深化（一）：操作细节单选题","s":"简述会阴清洁的原则。","t":"short","a":"保护隐私（屏风/床帘遮挡）；注意保暖、防止受凉；全面评估（自理能力、会阴状况、特殊状况如失禁/留置尿管）；注意清洁顺序、防止孔道间交叉感染。目的是保持清洁、增进舒适、预防感染。"},{"n":392,"m":"综合深化（一）：操作细节单选题","s":"简述为长期照护对象进行面部清洁的顺序及关键原则。","t":"short","a":"顺序：眼部→额部→鼻部→面颊→颈部；水温38～40℃；擦洗眼部时先对侧后近侧、由内眦向外眦；动作轻柔，清洁后涂润肤霜；毛巾、水盆专人专用、定期消毒。"},{"n":393,"m":"综合深化（一）：操作细节单选题","s":"简述协助进食的通用安全要点。","t":"short","a":"进食前评估吞咽功能；餐食水温38～40℃、不用双层隔热餐具；禁仰卧位进食；进食后保持体位30min防反流误吸；吞咽慢者宜低头进食、照护师坐对面由下向上喂；一口量约1/3汤勺、缓慢勿催；全程观察，发生噎食立即停止抢救并报告。"},{"n":394,"m":"综合深化（一）：操作细节单选题","s":"简述协助长期照护对象进水的要点。","t":"short","a":"白开水最佳、水温38～40℃；少量多次、\"未渴先饮\"，白天约每2h一次、每次约200mL；每日进水（含菜汤米粥）约1700～2000mL；喝水前评估吞咽功能；易呛咳者在水中加藕粉等增稠；呛咳时立即指导前倾低头并拍背至呛咳停止。"},{"n":395,"m":"综合深化（一）：操作细节单选题","s":"简述协助偏瘫对象翻身（仰卧→健侧卧）的基本步骤。","t":"short","a":"被子S形折叠；健手将患手固定胸腹前、屈健膝健脚掌支撑；先移上身、再环抱臀部向对侧移位、健侧下肢带动患侧屈双膝；转头后整体翻向健侧至床中线；颈肩垫软垫，患臂向前功能位、臂下垫软垫，健腿后伸、患腿屈膝迈步状，小腿下垫软垫减压、盖被。"},{"n":396,"m":"综合深化（一）：操作细节单选题","s":"协助床边坐起的注意事项包括（　）。","t":"multi","a":"ABCD","o":[{"key":"A","text":"熟练掌握操作技能、评估制订计划需多方参与"},{"key":"B","text":"循序渐进、不能操之过急"},{"key":"C","text":"密切观察反应，异常立即停止恢复卧位"},{"key":"D","text":"及时给予鼓励增强信心"}]},{"n":397,"m":"综合深化（一）：操作细节单选题","s":"为长期照护对象洗发的注意事项包括（　）。","t":"multi","a":"ABCD","o":[{"key":"A","text":"洗发不宜过勤"},{"key":"B","text":"保持室温水温恒定、洗后及时擦干防着凉"},{"key":"C","text":"随时观察表情、不适及时调整"},{"key":"D","text":"头皮有炎症禁抓挠"}]},{"n":398,"m":"综合深化（一）：操作细节单选题","s":"协助穿戴足踝矫形器的注意事项包括（　）。","t":"multi","a":"ABCD","o":[{"key":"A","text":"专业医师指导下进行"},{"key":"B","text":"弹力绷带松紧适宜（过松滑脱、过紧影响血循环）"},{"key":"C","text":"骨隆突处用纱布或棉花保护"},{"key":"D","text":"居家指导家属循序渐进训练、防跌倒"}]},{"n":399,"m":"综合深化（一）：操作细节单选题","s":"协助倾倒排泄物时的个人防护与操作要点包括（　）。","t":"multi","a":"ABCD","o":[{"key":"A","text":"佩戴手套与口罩"},{"key":"B","text":"取容器拿稳避免洒落"},{"key":"C","text":"倾倒后及时清洗消毒"},{"key":"D","text":"用\"8 <script>
const MS={"职业模块一　生活照护":"生活照护","职业模块二　基础护理":"基础护理","职业模块三　应急处置":"应急处置","职业模块四　功能维护":"功能维护","综合深化（一）：操作细节单选题":"综合深化","补充重点（知识类考点）":"补充重点"};
const TL={single:"单选题",multi:"多选题",tf:"判断题",short:"简答题"};
Q.forEach(q=>{q.ms=MS[q.m]||q.m;});
const $=s=>document.querySelector(s),$$=s=>[...document.querySelectorAll(s)];
function shuf(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=0|Math.random()*(i+1);[a[i],a[j]]=[a[j],a[i]];}return a;}
function toast(m){const t=$("#toast");t.textContent=m;t.classList.add("show");clearTimeout(t._);t._=setTimeout(()=>t.classList.remove("show"),1600);}
function esc(s){return(s==null?"":String(s)).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));}
function fmt(s){return String(0|s/60).padStart(2,"0")+":"+String(s%60).padStart(2,"0");}
function fms(s){return(0|s/60)+":"+String(s%60).padStart(2,"0");}

const C={mode:"practice",order:"random",types:new Set(["single","multi","tf","short"]),mods:new Set(Object.keys(MS)),cnt:20};
function pool(){return Q.filter(q=>C.types.has(q.t)&&C.mods.has(q.m));}
function tc(t){return Q.filter(q=>q.t===t).length;}
function mc(m){return Q.filter(q=>q.m===m).length;}

(function init(){
  $("#t0").textContent=Q.length;
  $("#t1").textContent=Q.filter(q=>q.t==="single"||q.t==="tf").length;
  $("#t2").textContent=Q.filter(q=>q.t==="multi").length;
  $("#t3").textContent=Q.filter(q=>q.t==="short").length;
  [["single","单选"],["multi","多选"],["tf","判断"],["short","简答"]].forEach(([k,l])=>{
    const b=document.createElement("button");b.className="ch";b.setAttribute("aria-pressed","true");
    b.innerHTML=`${l}<span class="n">${tc(k)}</span>`;
    b.onclick=()=>{tog(C.types,k,b);recount();};$("#tCh").appendChild(b);
  });
  Object.keys(MS).forEach(m=>{
    const b=document.createElement("button");b.className="ch";b.setAttribute("aria-pressed","true");
    b.innerHTML=`${MS[m]}<span class="n">${mc(m)}</span>`;
    b.onclick=()=>{tog(C.mods,m,b);recount();};$("#mCh").appendChild(b);
  });
  recount();
})();
function tog(set,k,btn){if(set.has(k)){if(set.size===1){toast("至少保留一项");return;}set.delete(k);btn.setAttribute("aria-pressed","false");}else{set.add(k);btn.setAttribute("aria-pressed","true");}}
function recount(){
  const cc=$("#cCh");cc.innerHTML="";const av=pool().length;
  [10,20,50,100].filter(n=>n<av).concat([av]).forEach(n=>{
    const b=document.createElement("button");b.className="ch";b.dataset.c=n;
    b.textContent=n===av?`全部 ${n}`:`${n} 题`;
    b.onclick=()=>{C.cnt=n;$$("#cCh .ch").forEach(x=>x.setAttribute("aria-pressed","false"));b.setAttribute("aria-pressed","true");upN();};
    cc.appendChild(b);
  });
  let pick=cc.querySelector('[data-c="20"]')||cc.lastChild;
  if(pick){pick.setAttribute("aria-pressed","true");C.cnt=+pick.dataset.c;}
  upN();
}
function upN(){const av=pool().length;C.cnt=Math.min(C.cnt,av);$("#goN").textContent=C.cnt+" 题";$("#goBtn").disabled=!av;}
seg("mSeg",v=>{C.mode=v;$("#mDesc").textContent=v==="practice"?"每题作答后即时显示对错与解析。":"可自由跳题、修改，最后交卷统一评分。";});
seg("oSeg",v=>{C.order=v;});
function seg(id,cb){$("#"+id).addEventListener("click",e=>{const b=e.target.closest("button");if(!b)return;$$("#"+id+" button").forEach(x=>x.setAttribute("aria-pressed","false"));b.setAttribute("aria-pressed","true");cb(b.dataset.v);});}

let S=null;
function go(qs2){
  let qs=C.order==="random"?shuf(qs2):qs2.slice().sort((a,b)=>a.n-b.n);
  S={md:C.mode,qs,i:0,ans:{},mk:new Set,lk:{},sf:{},t0:Date.now(),ti:null,done:false};
  $("#homeBtn").style.display="inline-block";show("quiz");
  $("#pgM").textContent=S.md==="practice"?"练习":"考试";
  clearInterval(S.ti);S.ti=setInterval(()=>{$("#tmr").textContent=fmt(0|((Date.now()-S.t0)/1000));},1000);
  $("#tmr").textContent="00:00";rQ();
}
function cq(){return S.qs[S.i];}
function gO(q){return q.t==="tf"?[{key:"√",text:"正确"},{key:"×",text:"错误"}]:(q.o||[]);}
function ia(q){const a=S.ans[q.n];if(q.t==="multi")return Array.isArray(a)&&a.length>0;if(q.t==="short")return!!S.sf[q.n];return a!=null;}
function ic(q){const a=S.ans[q.n];if(q.t==="multi")return Array.isArray(a)&&a.slice().sort().join("")===q.a;if(q.t==="short")return S.sf[q.n]==="know";return a===q.a;}

function rQ(){
  const q=cq(),tot=S.qs.length;
  $("#pgT").textContent=`${S.i+1} / ${tot}`;
  $("#pgB").style.width=((S.i+1)/tot*100)+"%";
  const lk=S.md==="practice"&&S.lk[q.n];
  let h=`<div class="qh"><span class="bdg ${q.t}">${TL[q.t]}</span><span class="src">${q.ms}</span>
    <button class="flg" id="flg" aria-pressed="${S.mk.has(q.n)}">⚑</button><span class="qno">#${q.n}</span></div>
    <p class="stem">${esc(q.s)}</p>`;
  if(q.t==="short"){
    h+=`<div class="sbox"><textarea id="sI" placeholder="在此作答（简答题自评，参考答案见下）">${S.ans[q.n]?esc(S.ans[q.n]):""}</textarea></div>
      <button class="cfm" id="sRef">查看参考答案</button>
      <div class="rvl ${S.sf[q.n]?'show':''}" id="rvl">
        <div class="aln"><b>参考答案</b></div><div class="refans">${esc(q.a)}</div>
        <div class="self"><button class="kn" id="sK" aria-pressed="${S.sf[q.n]==='know'}">✓ 已掌握</button>
        <button class="dk" id="sD" aria-pressed="${S.sf[q.n]==='dunno'}">✗ 需复习</button></div></div>`;
  }else{
    h+=`<div class="opts" id="opts">`;
    gO(q).forEach(o=>{h+=`<button class="opt" data-k="${o.key}"><span class="k">${o.key}</span><span class="tx">${esc(o.text)}</span></button>`;});
    h+=`</div>`;
    if(q.t==="multi"&&!lk)h+=`<button class="cfm" id="cM">确认作答</button>`;
    h+=`<div class="rvl" id="rvl"></div>`;
  }
  $("#qc").innerHTML=h;
  $("#flg").onclick=()=>{if(S.mk.has(q.n))S.mk.delete(q.n);else S.mk.add(q.n);$("#flg").setAttribute("aria-pressed",S.mk.has(q.n));};
  if(q.t==="short"){
    const ta=$("#sI");if(ta)ta.oninput=()=>{S.ans[q.n]=ta.value;};
    $("#sRef").onclick=()=>{$("#rvl").classList.add("show");};
    const sk=$("#sK"),sd=$("#sD");
    if(sk)sk.onclick=()=>{S.sf[q.n]="know";sk.setAttribute("aria-pressed","true");sd.setAttribute("aria-pressed","false");};
    if(sd)sd.onclick=()=>{S.sf[q.n]="dunno";sd.setAttribute("aria-pressed","true");sk.setAttribute("aria-pressed","false");};
  }else{bO(q);if(lk)rA(q);else if(S.md==="exam")pS(q);}
  uN();
}
function bO(q){
  $$("#opts .opt").forEach(btn=>{
    btn.onclick=()=>{
      if(S.md==="practice"&&S.lk[q.n])return;
      if(q.t==="multi"){let a=Array.isArray(S.ans[q.n])?S.ans[q.n].slice():[];
        if(a.includes(btn.dataset.k))a=a.filter(x=>x!==btn.dataset.k);else a.push(btn.dataset.k);
        S.ans[q.n]=a;btn.setAttribute("aria-pressed",a.includes(btn.dataset.k)?"true":"false");
      }else{S.ans[q.n]=btn.dataset.k;$$("#opts .opt").forEach(o=>o.setAttribute("aria-pressed",o.dataset.k===btn.dataset.k?"true":"false"));
        if(S.md==="practice"){S.lk[q.n]=true;rA(q);}
      }
    };
  });
  const cm=$("#cM");if(cm)cm.onclick=()=>{const a=S.ans[q.n];if(!Array.isArray(a)||!a.length){toast("请至少选择一项");return;}if(S.md==="practice"){S.lk[q.n]=true;rA(q);}else toast("已记录");};
}
function pS(q){const a=S.ans[q.n];$$("#opts .opt").forEach(o=>{const sel=q.t==="multi"?(Array.isArray(a)&&a.includes(o.dataset.k)):(a===o.dataset.k);o.setAttribute("aria-pressed",sel?"true":"false");});}
function rA(q){
  const a=S.ans[q.n],cor=q.a.split("");
  $$("#opts .opt").forEach(o=>{o.classList.add("lk");if(cor.includes(o.dataset.k))o.classList.add("correct");
    else if(q.t==="multi"?(Array.isArray(a)&&a.includes(o.dataset.k)):(a===o.dataset.k))o.classList.add("wrong");});
  const cm=$("#cM");if(cm)cm.remove();
  const ok=ic(q),rv=$("#rvl");
  rv.innerHTML=`<div class="vd ${ok?'ok':'no'}"><i>${ok?'✓':'✕'}</i>${ok?'回答正确':'回答错误'}</div>
    <div class="aln">正确答案：<b>${q.a}</b>${q.t==='multi'?' （多选）':''}</div>
    ${q.e?`<div class="expl">${esc(q.e)}</div>`:''}`;
  rv.classList.add("show");uN();
}
function uN(){
  $("#pBtn").disabled=S.i===0;const last=S.i===S.qs.length-1;const nb=$("#nBtn");
  if(last){nb.textContent="交卷评分";nb.className="nb sub";}else{nb.textContent="下一题";nb.className="nb nxt";}
}
$("#pBtn").onclick=()=>{if(S.i>0){S.i--;rQ();}};
$("#nBtn").onclick=()=>{if(S.i<S.qs.length-1){S.i++;rQ();}else cSub();};

function openC(){
  const g=$("#cGrd");g.innerHTML="";
  S.qs.forEach((q,i)=>{const c=document.createElement("button");c.className="gc";c.textContent=i+1;
    if(i===S.i)c.classList.add("cu");if(ia(q))c.classList.add("dn");if(S.mk.has(q.n))c.classList.add("fg");
    c.onclick=()=>{S.i=i;closeC();rQ();};g.appendChild(c);
  });$("#sheet").classList.add("open");
}
function closeC(){$("#sheet").classList.remove("open");}
$("#oCard").onclick=openC;$("#cClose").onclick=closeC;$("#scrm").onclick=closeC;
$("#cSub").onclick=()=>{closeC();cSub();};

function cSub(){
  const un=S.qs.filter(q=>!ia(q)).length;
  const msg=S.md==="exam"?(un?`还有 ${un} 题未作答，确定交卷？`:"确定交卷并查看成绩？"):(un?`还有 ${un} 题未完成，确定结束？`:"已全部完成，查看结果？");
  if(confirm(msg))doSub();
}
function doSub(){
  clearInterval(S.ti);S.done=true;S.el=0|((Date.now()-S.t0)/1000);
  rRes();show("results");$("#homeBtn").style.display="none";
}

let wOnly=false;
function rRes(){
  const au=S.qs.filter(q=>q.t!=="short"),ri=au.filter(q=>ic(q)).length,wr=au.length-ri;
  const pct=au.length?Math.round(ri/au.length*100):0;
  setTimeout(()=>{$("#ring").style.setProperty("--p",pct);},50);
  $("#scN").innerHTML=pct+'<small>%</small>';
  $("#rR").textContent=ri;$("#rW").textContent=wr;$("#rA").textContent=au.length;$("#rT").textContent=fms(S.el);
  const pass=pct>=60;
  $("#ppill").innerHTML=`<span class="pp ${pass?'pass':'fail'}">${pass?'✓ 合格（≥60%）':'未达 60%，继续加油'}</span>`;
  const sn=S.qs.filter(q=>q.t==="short").length;
  $("#sNote").innerHTML=sn?`<div class="sn">本卷含 ${sn} 道简答题（自评，不计入客观题正确率）。</div>`:"";
  wOnly=false;$("#wOnly").setAttribute("aria-pressed","false");rRV();
}
function rRV(){
  const box=$("#rvList");box.innerHTML="";
  S.qs.forEach((q,i)=>{
    const au=q.t!=="short",ok=au?ic(q):(S.sf[q.n]==="know");
    if(wOnly&&(au?ok:true))return;
    const a=S.ans[q.n];
    const yt=q.t==="short"?(a?esc(a):"未作答"):q.t==="multi"?(Array.isArray(a)&&a.length?a.sort().join(""):"未选"):(a||"未选");
    const d=document.createElement("div");d.className="rv "+(au?(ok?"ir":"iw"):"");
    let oh="";
    if(au){gO(q).forEach(o=>{const isC=q.a.includes(o.key),ch=q.t==="multi"?(Array.isArray(a)&&a.includes(o.key)):(a===o.key);
      oh+=`<div class="ro ${isC?'c':(ch?'w':'')}">${o.key}．${esc(o.text)} ${isC?'✓':''} ${(!isC&&ch)?'✗你选':''}</div>`;});}
    d.innerHTML=`<div class="rh2"><span class="bdg ${q.t}">${TL[q.t]}</span><span class="src" style="font-size:11px;color:var(--sub)">${q.ms} · #${q.n}</span></div>
      <div class="stm">${i+1}. ${esc(q.s)}</div>${oh}
      ${au?`<div class="yr">你的作答：<b class="${ok?'ok':'no'}">${yt}</b>　正确答案：<b class="ok">${q.a}</b></div>`
          :`<div class="yr">参考答案：</div><div class="refans">${esc(q.a)}</div>${a?`<div class="yr" style="margin-top:6px">你的作答：${esc(a)}</div>`:''}`}
      ${q.e?`<div class="expl">${esc(q.e)}</div>`:""}`;
    box.appendChild(d);
  });
  if(!box.children.length)box.innerHTML=`<div class="expl" style="text-align:center">全部答对，太棒了！🎉</div>`;
}
$("#wOnly").onclick=()=>{wOnly=!wOnly;$("#wOnly").setAttribute("aria-pressed",wOnly);rRV();};
$("#retry").onclick=()=>{const w=S.qs.filter(q=>q.t!=="short"?!ic(q):S.sf[q.n]!=="know");if(!w.length){toast("没有错题！");return;}go(w);};
$("#bHome").onclick=()=>{show("home");$("#homeBtn").style.display="none";};
$("#homeBtn").onclick=()=>{if(confirm("退出当前试卷？")){clearInterval(S.ti);show("home");$("#homeBtn").style.display="none";}};
$("#goBtn").onclick=()=>{const p=pool();if(!p.length){toast("当前范围没有题目");return;}
  go(C.order==="random"?shuf(p).slice(0,C.cnt):p.sort((a,b)=>a.n-b.n).slice(0,C.cnt));scrollTo(0,0);};

function show(id){$$(".scr").forEach(s=>s.classList.remove("on"));$("#"+id).classList.add("on");scrollTo(0,0);}
</script>
</body>
</html>
